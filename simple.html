<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login Page</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f2f2f2;
}

/* Menu */

nav{
background:#0d6efd;
padding:15px;
}

nav ul{
list-style:none;
display:flex;
justify-content:center;
}

nav ul li{
margin:0 20px;
}

nav ul li a{
color:white;
text-decoration:none;
font-size:18px;
font-weight:bold;
}

nav ul li a:hover{
color:yellow;
}

/* Login */

.container{
width:350px;
background:white;
padding:30px;
margin:70px auto;
border-radius:10px;
box-shadow:0 0 10px gray;
}

.container h2{
text-align:center;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#0d6efd;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#084298;
}

.footer{
text-align:center;
margin-top:20px;
color:gray;
}

</style>

</head>
<body>

<nav>
<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Contact</a></li>
<li><a href="#">Login</a></li>
</ul>
</nav>

<div class="container">

<h2>Login</h2>

<form>

<input type="text" placeholder="Username" required>

<input type="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<div class="footer">
<p>© 2026 My Website</p>
</div>

</div>

</body>
</html>
