<!DOCTYPE html>
<html>
<head>
<title>My Website</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#f2f2f2;
}

/* Menu Bar */

ul{
    list-style:none;
    margin:0;
    padding:0;
    overflow:hidden;
    background:#0077cc;
}

li{
    float:left;
}

li a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px 20px;
}

li a:hover{
    background:#005fa3;
}

/* Login Box */

.login{
    width:350px;
    margin:60px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

h2{
    text-align:center;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid gray;
    border-radius:5px;
}

button{
    width:100%;
    padding:10px;
    background:green;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:darkgreen;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:gray;
}

</style>

</head>

<body>

<ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Services</a></li>
    <li><a href="#">Contact</a></li>
    <li><a href="#">Login</a></li>
</ul>

<div class="login">

<h2>Login Page</h2>

<form>

<label>User Name</label>

<input type="text" placeholder="Enter Username">

<label>Password</label>

<input type="password" placeholder="Enter Password">

<button>Login</button>

</form>

</div>

<div class="footer">

<p>© 2026 My Website. All Rights Reserved.</p>

</div>

</body>
</html>
